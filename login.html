<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login-Boutique Açaí</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="container">
        <img src="img/logo.jpg" alt="Logo Boutique Açaí" class="logo">
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="cardapio.html">Cardápio</a>
            <a href="contato.html">Contato</a>
        </nav>
        <div class="auth-group">
            <a href="login.html" class="btn-auth">Login</a>
            <a href="cadastro.html" class="btn-auth">Cadastro</a>
            <a href="carrinho.html" class="btn-auth">Carrinho</a>
        </div>
        <div class="search">
            <input type="text" placeholder="Pesquisar">
        </div>
    </header>

    <div class="content">
        <h1>Bem-vindo de volta!</h1>
        <p>Faça login para acessar sua conta e aproveitar nossas deliciosas ofertas de açaí.</p>

        <!-- Formulário de Login -->
        <div class="login-form">
            <form action="#" method="post">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit" class="btn-cta">Entrar</button>
            </form>
            <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui!</a></p>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Boutique Açaí. Todos os direitos reservados.</p>
    </div>
</body>
</html>
